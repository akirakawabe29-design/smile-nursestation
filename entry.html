<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エントリー・見学お申し込み | smile訪問看護ステーション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            smileOrange: '#CB6CE6',
            smileCoral: '#F4DF2C',
            smileGreen: '#9B4DCA',
            smileYellow: '#FDF6B8',
            bgSoft: '#FDFBFF',
            textMain: '#2D2D3A',
            textMuted: '#5A5A68',
            errorRed: '#EF4444'
          },
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
            rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* フォーム要素のフォーカス時のトランジション */
    .form-input {
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    /* カスタムラジオボタン/チェックボックスのスタイル */
    .custom-radio:checked + div {
      background-color: #F3E8F9;
      border-color: #CB6CE6;
      color: #CB6CE6;
      font-weight: bold;
    }
    .js-fade-up {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity, transform;
    }
    .js-fade-up.is-active {
      opacity: 1;
      transform: translateY(0);
    }
    .entry-page {
      background:
        radial-gradient(circle at 10% 12%, rgba(203,108,230,.14), transparent 36%),
        radial-gradient(circle at 88% 88%, rgba(244,223,44,.14), transparent 32%),
        linear-gradient(180deg, #FDFBFF 0%, #F7F2FA 55%, #F4F4ED 100%);
    }
    .comic-dots {
      position: relative;
      overflow: hidden;
    }
    .comic-dots::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(203,108,230,.14) 1.2px, transparent 1.5px);
      background-size: 15px 15px;
      mask-image: linear-gradient(135deg, #000 0%, rgba(0,0,0,.42) 42%, transparent 76%);
      z-index: 0;
    }
    .comic-dots > * { position: relative; z-index: 1; }
  </style>
</head>
<body class="entry-page font-sans text-textMain bg-bgSoft antialiased selection:bg-smileOrange selection:text-white pb-20 md:pb-0">

  <main class="py-12 px-4 relative z-10">
    <div class="max-w-2xl mx-auto js-fade-up">
      <div class="text-center mb-10">
        <h1 class="font-rounded text-2xl md:text-3xl font-bold text-textMain mb-4">エントリー・見学お申し込み</h1>
        <p class="text-textMuted text-sm md:text-base leading-relaxed">
          まずは少し話を聞いてみたい、という方も大歓迎です。<br>
          以下のフォームに必要事項をご入力の上、送信してください。
        </p>
      </div>

      <div class="comic-dots bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div id="success-message" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm z-20 flex flex-col items-center justify-center text-center p-6">
          <div class="w-16 h-16 bg-purple-100 text-smileOrange border border-purple-200 rounded-full flex items-center justify-center mb-4 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
          </div>
          <h2 class="text-2xl font-bold text-textMain mb-2">送信が完了しました</h2>
          <p class="text-textMuted mb-8 max-w-md leading-relaxed">
            お問い合わせありがとうございます。<br>
            内容を確認次第、担当者よりご連絡させていただきます。
          </p>
          <button onclick="location.reload()" class="bg-smileOrange text-white font-bold py-3 px-8 rounded-full shadow-sm hover:bg-purple-700 transition-colors">
            新しく入力する
          </button>
        </div>

        <form id="entry-form" class="space-y-8" novalidate>
          
          <div>
            <label class="block font-bold text-textMain mb-3">
              お問い合わせの目的 <span class="bg-smileOrange text-white text-xs px-2 py-1 rounded ml-2">必須</span>
            </label>
            <div class="grid grid-cols-2 gap-3">
              <label class="cursor-pointer relative">
                <input type="radio" name="purpose" value="エントリー（面接希望）" class="custom-radio sr-only" required>
                <div class="border-2 border-purple-100 rounded-xl p-4 text-center transition-all hover:bg-purple-50 text-sm md:text-base">
                  エントリー<br><span class="text-xs text-textMuted font-normal">（面接を希望する）</span>
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input type="radio" name="purpose" value="見学・話を聞きたい" class="custom-radio sr-only">
                <div class="border-2 border-purple-100 rounded-xl p-4 text-center transition-all hover:bg-purple-50 text-sm md:text-base">
                  見学・相談<br><span class="text-xs text-textMuted font-normal">（まずは話を聞きたい）</span>
                </div>
              </label>
            </div>
          </div>

          <div>
            <label for="name" class="block font-bold text-textMain mb-2">
              お名前 <span class="bg-smileOrange text-white text-xs px-2 py-1 rounded ml-2">必須</span>
            </label>
            <input type="text" id="name" name="name" placeholder="例：尼崎 笑顔" required
              class="form-input w-full bg-purple-50/40 border border-purple-100 text-textMain rounded-xl p-4 focus:outline-none focus:border-smileOrange focus:ring-2 focus:ring-smileOrange/20 focus:bg-white text-base">
            <p class="text-errorRed text-xs mt-1 hidden js-error-msg">お名前を入力してください。</p>
          </div>

          <div>
            <label class="block font-bold text-textMain mb-3">
              保有資格・希望職種 <span class="bg-purple-200 text-purple-900 text-xs px-2 py-1 rounded ml-2">任意</span>
            </label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <label class="flex items-center gap-2 p-3 border border-purple-100 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                <input type="checkbox" name="job_type" value="看護師" class="w-4 h-4 text-smileOrange border-purple-200 rounded focus:ring-smileOrange">
                <span class="text-sm">看護師</span>
              </label>
              <label class="flex items-center gap-2 p-3 border border-purple-100 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                <input type="checkbox" name="job_type" value="准看護師" class="w-4 h-4 text-smileOrange border-purple-200 rounded focus:ring-smileOrange">
                <span class="text-sm">准看護師</span>
              </label>
              <label class="flex items-center gap-2 p-3 border border-purple-100 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                <input type="checkbox" name="job_type" value="理学療法士" class="w-4 h-4 text-smileOrange border-purple-200 rounded focus:ring-smileOrange">
                <span class="text-sm">理学療法士</span>
              </label>
              <label class="flex items-center gap-2 p-3 border border-purple-100 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                <input type="checkbox" name="job_type" value="作業療法士" class="w-4 h-4 text-smileOrange border-purple-200 rounded focus:ring-smileOrange">
                <span class="text-sm">作業療法士</span>
              </label>
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-8 md:gap-4">
            <div>
              <label for="tel" class="block font-bold text-textMain mb-2">
                電話番号 <span class="bg-smileOrange text-white text-xs px-2 py-1 rounded ml-2">必須</span>
              </label>
              <input type="tel" id="tel" name="tel" placeholder="例：090-1234-5678" required
                class="form-input w-full bg-purple-50/40 border border-purple-100 text-textMain rounded-xl p-4 focus:outline-none focus:border-smileOrange focus:ring-2 focus:ring-smileOrange/20 focus:bg-white text-base">
              <p class="text-errorRed text-xs mt-1 hidden js-error-msg">電話番号を入力してください。</p>
            </div>
            <div>
              <label for="email" class="block font-bold text-textMain mb-2">
                メールアドレス <span class="bg-smileOrange text-white text-xs px-2 py-1 rounded ml-2">必須</span>
              </label>
              <input type="email" id="email" name="email" placeholder="例：mail@example.com" required
                class="form-input w-full bg-purple-50/40 border border-purple-100 text-textMain rounded-xl p-4 focus:outline-none focus:border-smileOrange focus:ring-2 focus:ring-smileOrange/20 focus:bg-white text-base">
              <p class="text-errorRed text-xs mt-1 hidden js-error-msg">正しいメールアドレスを入力してください。</p>
            </div>
          </div>

          <div>
            <label for="message" class="block font-bold text-textMain mb-2">
              ご質問・ご要望など <span class="bg-purple-200 text-purple-900 text-xs px-2 py-1 rounded ml-2">任意</span>
            </label>
            <p class="text-xs text-textMuted mb-2">「週3日からの勤務を希望したい」「子どものお迎えの時間まで働けるか知りたい」など、気になることがあればお気軽にご記入ください。</p>
            <textarea id="message" name="message" rows="4" placeholder="こちらにご記入ください"
              class="form-input w-full bg-purple-50/40 border border-purple-100 text-textMain rounded-xl p-4 focus:outline-none focus:border-smileOrange focus:ring-2 focus:ring-smileOrange/20 focus:bg-white text-base resize-none"></textarea>
          </div>

          <div class="pt-6 border-t border-purple-100 text-center">
            <button type="submit" id="submit-btn" class="w-full md:w-auto md:min-w-[300px] bg-smileOrange text-white font-bold text-lg py-4 px-8 rounded-full shadow-md hover:bg-purple-700 transition-all hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-purple-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2 mx-auto">
              <span>入力内容を送信する</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
            <p class="text-xs text-textMuted mt-4">※送信後、自動で担当者にメールが送られます。</p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // アニメーション発火
      setTimeout(() => {
        document.querySelectorAll('.js-fade-up').forEach(el => el.classList.add('is-active'));
      }, 100);

      const form = document.getElementById('entry-form');
      const submitBtn = document.getElementById('submit-btn');
      const successOverlay = document.getElementById('success-message');

      // 簡易的なリアルタイムバリデーション（UX向上目的）
      const requiredInputs = form.querySelectorAll('input[required]');
      
      const checkValidity = () => {
        let isValid = true;
        requiredInputs.forEach(input => {
          if (input.type === 'radio') {
            const radioGroup = form.querySelectorAll(`input[name="${input.name}"]`);
            const isChecked = Array.from(radioGroup).some(radio => radio.checked);
            if (!isChecked) isValid = false;
          } else {
            if (!input.value.trim() || !input.checkValidity()) {
              isValid = false;
            }
          }
        });
        // 全てOKならボタンを少し明るく/クリック可能にするなどの視覚的フィードバック（ここでは標準機能に任せる）
        return isValid;
      };

      // 送信イベントのハンドリング
      form.addEventListener('submit', (e) => {
        e.preventDefault(); // デフォルトの送信をブロック

        // 未入力チェック（HTML5のバリデーションをトリガー）
        if (!form.checkValidity()) {
          requiredInputs.forEach(input => {
            const errorMsg = input.nextElementSibling;
            if (!input.validity.valid && errorMsg && errorMsg.classList.contains('js-error-msg')) {
              errorMsg.classList.remove('hidden');
              input.classList.add('border-errorRed');
            } else if (errorMsg && errorMsg.classList.contains('js-error-msg')) {
              errorMsg.classList.add('hidden');
              input.classList.remove('border-errorRed');
            }
          });
          // エラーがある最初の要素にフォーカス
          const firstInvalid = form.querySelector(':invalid');
          if (firstInvalid) firstInvalid.focus();
          return;
        }

        // --- ここに実際の送信処理（Fetch APIでのPOSTなど）を記述 ---
        // 今回は送信成功をシミュレート
        submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 送信中...';
        submitBtn.disabled = true;

        setTimeout(() => {
          form.classList.add('opacity-0', 'transition-opacity', 'duration-500');
          setTimeout(() => {
            successOverlay.classList.remove('hidden');
            successOverlay.classList.add('animate-fade-in');
          }, 500);
        }, 1500); // 1.5秒後に完了画面を表示
      });

      // 入力時にエラー表示を消す
      requiredInputs.forEach(input => {
        input.addEventListener('input', () => {
          const errorMsg = input.nextElementSibling;
          if (input.validity.valid && errorMsg && errorMsg.classList.contains('js-error-msg')) {
            errorMsg.classList.add('hidden');
            input.classList.remove('border-errorRed');
          }
        });
      });
    });
  </script>
  <script src="shared-layout.js"></script>
</body>
</html>
